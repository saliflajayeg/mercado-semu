# Render Blueprint for Mercado Semu.
# In Render: New → Blueprint → connect the mercado-semu repo → it reads this file.
# You'll be asked to fill in the env var values (they are not stored in git).
services:
  - type: web
    name: mercado-semu
    runtime: node
    # Start on the FREE plan ($0). It sleeps after ~15 min idle, so the first
    # visitor after a quiet spell waits ~50s while it wakes. Upgrade to
    # "starter" (~$7/mo, always awake) with one click when traffic grows.
    plan: free
    region: frankfurt # closest to Equatorial Guinea
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true # redeploys on every git push to the main branch
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false
      - key: NEXT_PUBLIC_MUNIDINERO_NUMBER
        sync: false
      - key: NEXT_PUBLIC_MUNIDINERO_NAME
        sync: false
